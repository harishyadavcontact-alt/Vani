name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run healthcheck
        run: npm run healthcheck

      - name: Run tests
        run: npm run test
